steps:
  # ─── 1. Build & push nginx image with static content ───
  - name: build-image
    image: plugins/docker
    settings:
      repo: ghcr.io/solarity-ai/static-solarityai
      registry: ghcr.io
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token
      dockerfile: Dockerfile
      context: .
      tags:
        - latest
        - "${CI_COMMIT_SHA:0:7}"

  # ─── 2. Deploy to k8s ───
  - name: deploy
    image: alpine/helm:3.14.0
    commands:
      - apk add --no-cache kubectl
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_DATA" > ~/.kube/config
      - chmod 600 ~/.kube/config
      - kubectl set image deployment/static-solarityai nginx=ghcr.io/solarity-ai/static-solarityai:${CI_COMMIT_SHA:0:7} -n production
      - kubectl rollout status deployment/static-solarityai -n production --timeout=120s
    environment:
      KUBECONFIG_DATA:
        from_secret: kubeconfig

when:
  branch: develop
  event: push
