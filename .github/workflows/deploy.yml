name: Deploy Next.js Website to AWS

on:
  push:
    branches:
      - develop
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required for checkout

jobs:
  deploy:
    name: Build, Export and Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and export static site
        run: npm run build
        # next.config.ts has output: 'export' — generates the out/ directory

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "❌ Error: AWS_ROLE_ARN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.S3_BUCKET_NAME }}" ]; then
            echo "❌ Error: S3_BUCKET_NAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "❌ Error: CLOUDFRONT_DISTRIBUTION_ID secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are set"

      - name: Deploy static assets to S3 (long cache)
        run: |
          echo "📦 Uploading static assets (JS, CSS, images, fonts)..."
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*.html" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Deploy HTML and metadata to S3 (short cache)
        run: |
          echo "📄 Uploading HTML files and metadata..."
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "robots.txt" \
            --include "sitemap.xml" \
            --cache-control "public, max-age=3600, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          echo "🔄 Invalidating CloudFront distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "✅ Invalidation created: $INVALIDATION_ID"
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID \
            --max-attempts 30 \
            --delay 10 || echo "⚠️  Invalidation in progress (may take 5-15 minutes)"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket:** \`${{ secrets.S3_BUCKET_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront Distribution:** \`${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Website URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Production:** https://solarityai.com" >> $GITHUB_STEP_SUMMARY
          echo "- **WWW:** https://www.solarityai.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes will be live in 1-2 minutes after CloudFront propagation completes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Deployed via GitHub Actions using OIDC authentication*" >> $GITHUB_STEP_SUMMARY
