---
# Landing Page Deployment Tasks
# Deploys optimized static landing page files from build/ to Nginx document root

- name: Ensure landing page directory exists
  file:
    path: "{{ landing_page_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure landing page backup directory exists
  file:
    path: "{{ landing_page_root }}/backups"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create backup of current landing page (if exists)
  command: >
    tar -czf "{{ landing_page_root }}/backups/backup-{{ ansible_date_time.iso8601_basic_short }}.tar.gz" 
    --exclude='backups' -C "{{ landing_page_root }}" .
  ignore_errors: yes
  when: landing_page_enabled

# Deploy from optimized build folder
- name: Sync optimized landing page files from build/
  synchronize:
    src: "build/"
    dest: "{{ landing_page_root }}/"
    delete: yes
    recursive: yes
    rsync_opts:
      - "--no-motd"
      - "--checksum"
      - "--delete-excluded"
  when: landing_page_enabled

- name: Set landing page directory permissions
  file:
    path: "{{ landing_page_root }}"
    owner: root
    group: nginx
    mode: "0755"
    recurse: yes
  when: landing_page_enabled

- name: Set landing page file permissions
  file:
    path: "{{ landing_page_root }}"
    mode: "0644"
    state: directory
    recurse: yes
  when: landing_page_enabled

- name: Make index.html readable
  file:
    path: "{{ landing_page_root }}/index.html"
    mode: "0644"
    owner: root
    group: nginx
  when: landing_page_enabled

- name: Verify landing page index.html exists
  stat:
    path: "{{ landing_page_root }}/index.html"
  register: landing_index
  when: landing_page_enabled

- name: Success message if deployment succeeded
  debug:
    msg: "✅ Landing page successfully deployed to {{ landing_page_root }}"
  when: landing_page_enabled and landing_index.stat.exists

- name: Warn if landing page index.html is missing
  debug:
    msg: "⚠️  Warning: landing page index.html not found at {{ landing_page_root }}/index.html. Deployment may have failed."
  when: landing_page_enabled and not landing_index.stat.exists
