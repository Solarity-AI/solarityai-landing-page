---
- name: Reload Nginx Configuration
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: false

    - name: Display Nginx test result
      debug:
        msg: "{{ nginx_test.stderr_lines if nginx_test.rc != 0 else '✅ Nginx configuration is valid' }}"
      when: nginx_test.rc != 0

    - name: Reload Nginx (if config is valid)
      systemd:
        name: nginx
        state: reloaded
        enabled: yes
      when: nginx_test.rc == 0
      register: nginx_reload

    - name: Restart Nginx (if reload failed or config invalid)
      systemd:
        name: nginx
        state: restarted
        enabled: yes
      when: nginx_test.rc != 0
      register: nginx_restart

    - name: Verify Nginx is running
      systemd:
        name: nginx
        state: started
      register: nginx_status

    - name: Display status
      debug:
        msg: |
          ✅ Nginx has been successfully reloaded!
          Status: {{ nginx_status.status.ActiveState }}
          Since: {{ nginx_status.status.ActiveEnterTimestamp }}

