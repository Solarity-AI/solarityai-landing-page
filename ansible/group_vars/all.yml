---
# Configuration variables for SolarityAI Landing Page deployment

# Landing Page Configuration
landing_page_root: /usr/share/nginx/html/solarityai
landing_page_enabled: true

# Domain names for routing (auto-synced from Terraform)
# Landing page domains (root domain, www)
# Configured for solarityai.com

# Nginx settings
nginx_ssl_enabled: false  # Set to true if you have SSL certificates (ALB handles SSL termination)



















































landing_domain_names:
    - "solarityai.com"
    - "www.solarityai.com"
    - "sohbetterapi.solarityai.com"

